# Render Blueprint — 债券收益计算工具 后端服务
# 文档: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: bond-calc-api
    runtime: python
    pythonVersion: "3.11"
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false
        value: mongodb+srv://<user>:<password>@<cluster>.mongodb.net/ai_finance?retryWrites=true&w=majority
      - key: CORS_ORIGINS
        sync: false
        value: https://your-app.vercel.app
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
